<!DOCTYPE html>
<html>
<head>
    <title>Store</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --teal-primary: #00C2B3;
            --teal-glow: #14E5D4;
            --border-subtle: rgba(255, 255, 255, 0.08);
            --text-white: #FFFFFF;
            --text-muted: #9CA3AF;
            --success: #10B981;
        }
        body {
            background: #050810;
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }
        
        /* NEXT-LEVEL AMBIENT BACKGROUND */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            overflow: hidden; z-index: -1;
            background: #050810;
        }
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.5;
            animation: float 20s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }
        .blob-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: rgba(0, 194, 179, 0.25); animation-delay: 0s; }
        .blob-2 { bottom: -20%; right: -10%; width: 60vw; height: 60vw; background: rgba(20, 229, 212, 0.15); animation-delay: -5s; }
        .blob-3 { top: 40%; left: 40%; width: 40vw; height: 40vw; background: rgba(0, 143, 130, 0.2); animation-delay: -10s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1); } 50% { transform: translate(10%, 10%) scale(1.1); } 100% { transform: translate(-5%, 15%) scale(0.9); } }
        
        .store-container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        
        .top-bar {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;
            background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(20px);
            padding: 20px 30px; border-radius: 24px; border: 1px solid var(--border-subtle);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .top-bar h2 { font-family: 'DM Serif Display', serif; font-size: 2rem; display: flex; align-items: center; gap: 10px; margin: 0; }
        .coin-box {
            background: linear-gradient(135deg, #F59E0B, #D97706); color: #000;
            padding: 10px 20px; border-radius: 40px; font-weight: 700; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
        }
        
        .search-wrapper { margin-bottom: 40px; display: flex; gap: 16px; align-items: center; }
        .search-input {
            flex: 1; padding: 18px 24px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-subtle);
            border-radius: 60px; color: white; font-size: 1.1rem; transition: 0.3s;
        }
        .search-input:focus { outline: none; border-color: var(--teal-primary); box-shadow: 0 0 0 4px rgba(0, 194, 179, 0.1); }
        .cart-btn-main {
            padding: 16px 32px; background: var(--teal-primary); border: none; border-radius: 60px;
            color: #050810; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; gap: 10px; box-shadow: 0 8px 20px rgba(0, 194, 179, 0.3);
        }
        .cart-btn-main:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(0, 194, 179, 0.5); }
        
        .cat-heading { font-size: 1.8rem; margin: 40px 0 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-subtle); padding-bottom: 12px; }
        
        .store-grid-scroll { display: flex; gap: 24px; overflow-x: auto; padding-bottom: 24px; scroll-snap-type: x mandatory; }
        .store-grid-scroll::-webkit-scrollbar { height: 8px; }
        .store-grid-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
        .store-grid-scroll::-webkit-scrollbar-thumb { background: var(--teal-primary); border-radius: 10px; }
        
        .store-card {
            min-width: 280px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.06); border-radius: 24px; padding: 20px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); scroll-snap-align: start; position: relative; overflow: hidden;
        }
        .store-card:hover { transform: translateY(-10px); border-color: rgba(0, 194, 179, 0.4); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        .store-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 16px; margin-bottom: 16px; }
        .store-card h4 { font-size: 1.2rem; margin-bottom: 8px; }
        .store-card .price { font-size: 1.4rem; color: var(--teal-glow); font-weight: 700; margin-bottom: 8px; }
        
        .qty-controls { display: flex; align-items: center; gap: 16px; margin: 16px 0; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 40px; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05); }
        .qty-controls button { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: 0.2s; }
        .qty-controls button:hover { background: rgba(255,255,255,0.1); color: var(--teal-primary); }
        
        .add-cart-btn {
            width: 100%; padding: 12px; background: rgba(0, 194, 179, 0.1); border: 1px solid var(--teal-primary);
            color: var(--teal-primary); font-weight: 600; border-radius: 40px; cursor: pointer; transition: 0.3s;
        }
        .add-cart-btn:hover { background: var(--teal-primary); color: #000; box-shadow: 0 5px 15px rgba(0, 194, 179, 0.3); }
        
        /* CART DRAWER */
        #cartDrawer {
            position: fixed; right: -450px; top: 0; width: 420px; height: 100%;
            background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-left: 1px solid var(--border-subtle); box-shadow: -10px 0 50px rgba(0,0,0,0.5);
            transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10000; padding: 30px;
            display: flex; flex-direction: column;
        }
        #cartDrawer.open { right: 0; }
        
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border-subtle); }
        .cart-header h3 { font-size: 1.5rem; display: flex; align-items: center; gap: 8px; margin: 0; }
        .close-btn { cursor: pointer; color: var(--text-muted); font-size: 28px; transition: 0.3s; display: flex; align-items: center; }
        .close-btn:hover { color: var(--teal-glow); transform: rotate(90deg); }
        
        .address-box { background: rgba(255,255,255,0.03); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 16px; margin-bottom: 24px; }
        .address-box h4 { margin-bottom: 12px; color: var(--teal-primary); display: flex; align-items: center; gap: 8px; margin-top: 0; }
        
        input, textarea { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-subtle); border-radius: 12px; color: white; margin-bottom: 10px; font-family: 'Inter'; }
        input:focus, textarea:focus { outline: none; border-color: var(--teal-primary); }
        
        #cartItems { flex: 1; overflow-y: auto; padding-right: 10px; }
        #cartItems::-webkit-scrollbar { width: 6px; }
        #cartItems::-webkit-scrollbar-thumb { background: rgba(0, 194, 179, 0.3); border-radius: 10px; }
        
        .cart-item { background: rgba(255,255,255,0.02); padding: 16px; border-radius: 16px; margin-bottom: 12px; border: 1px solid var(--border-subtle); }
        
        .cart-footer { padding-top: 20px; border-top: 1px solid var(--border-subtle); margin-top: 10px; }
        .total-row { display: flex; justify-content: space-between; font-size: 1.4rem; font-weight: 700; margin-bottom: 20px; }
        
        .btn-confirm { width: 100%; padding: 18px; background: linear-gradient(135deg, var(--teal-primary), var(--teal-glow)); color: #000; font-size: 1.1rem; font-weight: 700; border: none; border-radius: 16px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,194,179,0.3); }
        .btn-confirm:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0,194,179,0.5); }
    </style>
</head>
<body>
<div class="ambient-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
</div>

<div class="store-container">
    <button onclick="goBack()" style="background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:1rem; margin-bottom:20px; display:flex; align-items:center; gap:8px;"><ion-icon name="arrow-back-outline"></ion-icon> Back to Dashboard</button>
    
    <!-- HEADER -->
    <div class="top-bar">
        <h2><ion-icon name="medical-outline" style="color:var(--teal-primary);"></ion-icon> Premium Pharmacy</h2>
        <div class="coin-box"><ion-icon name="cash-outline"></ion-icon> 120 Coins</div>
    </div>
    
    <div class="search-wrapper">
        <input id="searchBox" class="search-input" placeholder="Search for medicines, supplements..." onkeyup="filterStore()">
        <button onclick="openCart()" class="cart-btn-main"><ion-icon name="cart-outline"></ion-icon> View Cart</button>
    </div>
    
    <div id="storeContainer"></div>
</div>

<!-- CART DRAWER -->
<div id="cartDrawer">
    <div class="cart-header">
        <h3><ion-icon name="cart-outline"></ion-icon> Your Cart</h3>
        <span class="close-btn" onclick="closeCart()"><ion-icon name="close-outline"></ion-icon></span>
    </div>

    <!-- ADDRESS -->
    <div class="address-box">
        <h4><ion-icon name="location-outline"></ion-icon> Delivery Address</h4>
        <div id="selectedAddress" onclick="toggleAddressList()" style="cursor:pointer; background:rgba(0,0,0,0.3); padding:12px; border-radius:12px; display:flex; justify-content:space-between; align-items:center; border: 1px solid var(--border-subtle);">
            Select Address <ion-icon name="chevron-down-outline"></ion-icon>
        </div>
        
        <div id="addressList" style="display:none; margin-top:12px; max-height:150px; overflow-y:auto;"></div>
        
        <button onclick="showAddressForm()" style="width:100%; margin-top:12px; padding:10px; background:transparent; border:1px dashed var(--teal-primary); color:var(--teal-primary); border-radius:12px; cursor:pointer; font-weight: 500; transition: 0.3s;" onmouseover="this.style.background='rgba(0,194,179,0.1)'" onmouseout="this.style.background='transparent'">+ Add New Address</button>
        
        <div id="addressForm" style="display:none; margin-top:16px;">
            <input id="addrName" placeholder="Full Name">
            <input id="addrPhone" placeholder="Phone Number">
            <input id="addrCity" placeholder="City">
            <input id="addrPin" placeholder="Pincode">
            <textarea id="addrFull" placeholder="Complete Address" rows="2"></textarea>
            <button onclick="saveAddress()" style="width:100%; padding:12px; background:var(--teal-primary); color:#000; border:none; border-radius:12px; font-weight:600; cursor:pointer;">Save Address</button>
        </div>
    </div>

    <!-- ITEMS -->
    <div id="cartItems"></div>

    <div class="cart-footer">
        <button class="btn-confirm" onclick="confirmOrder()">Confirm Order <ion-icon name="arrow-forward-outline" style="vertical-align:middle; margin-left:8px;"></ion-icon></button>
    </div>
</div>

<div id="orderTracking" style="max-width:1200px; margin:0 auto 40px; padding:0 20px;"></div>
<script>

let selectedAddress = null;

// CSRF
function getCSRFToken(){
    return document.cookie.split('; ')
        .find(row => row.startsWith('csrftoken='))
        ?.split('=')[1];
}
function showAddressForm() {
    document.getElementById("addressForm").style.display = "block";
}

function saveAddress() {
    fetch("/save-address/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({
            name: document.getElementById("addrName").value,
            phone: document.getElementById("addrPhone").value,
            city: document.getElementById("addrCity").value,
            pincode: document.getElementById("addrPin").value,
            address: document.getElementById("addrFull").value
        })
    })
    .then(() => {
        alert("Address Saved ✅");
        loadAddresses();   // reload
    });
}
// 🔥 LOAD STORE
function loadStore() {
    fetch("/get-medicines/")
    .then(res => res.json())
    .then(data => {

        let grouped = {};

        // GROUP BY CATEGORY
        data.medicines.forEach(m => {
            if (!grouped[m.category]) grouped[m.category] = [];
            grouped[m.category].push(m);
        });

        let html = "";

        for (let cat in grouped) {

            html += `<div class="cat-heading">
                <span>${cat}</span>
                <button onclick="viewAll('${cat}')" style="background:rgba(255,255,255,0.05); border:none; color:var(--text-muted); padding:8px 16px; border-radius:40px; cursor:pointer; font-size:0.9rem; display:flex; align-items:center; gap:6px; transition:0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.1)'; this.style.color='white'" onmouseout="this.style.background='rgba(255,255,255,0.05)'; this.style.color='var(--text-muted)'">View All <ion-icon name="arrow-forward"></ion-icon></button>
            </div>`;

            html += `<div class="store-grid-scroll">`;

            grouped[cat].slice(0, 4).forEach(m => {
                html += `
                <div class="store-card" data-name="${m.name.toLowerCase()}" data-cat="${m.category.toLowerCase()}">
                    <img src="${m.image}">
                    <h4>${m.name}</h4>
                    <div class="price">₹${m.mrp}</div>
                    <p style="font-size:0.85rem; color:var(--text-muted);">Available: ${m.quantity} ${m.unit}</p>
                    
                    <div class="qty-controls">
                        <button onclick="decQty(${m.id})"><ion-icon name="remove-outline"></ion-icon></button>
                        <span id="qty-${m.id}" style="font-weight:700; font-size:1.1rem;">1</span>
                        <button onclick="incQty(${m.id})"><ion-icon name="add-outline"></ion-icon></button>
                    </div>
                    
                    <button class="add-cart-btn" onclick="addToCart(${m.id})"><ion-icon name="cart-outline" style="vertical-align:middle;"></ion-icon> Add to Cart</button>
                </div>
                `;
            });

            html += `</div>`;
        }

        document.getElementById("storeContainer").innerHTML = html;
    });
}
function goBack(){
    window.location.href = "/client-dashboard/";
}
function incQty(id) {
    let el = document.getElementById("qty-" + id);
    el.innerText = parseInt(el.innerText) + 1;
}
function viewAll(category) {
    alert("Show all medicines of " + category);
}
function decQty(id) {
    let el = document.getElementById("qty-" + id);
    let val = parseInt(el.innerText);
    if (val > 1) el.innerText = val - 1;
}
// 🔥 ADD CART
function addToCart(id) {

    let qty = parseInt(document.getElementById("qty-" + id).innerText);

    fetch("/add-to-cart/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({ id, qty })
    })
    .then(() => alert("Added ✅"));
}

// 🔥 OPEN CART
function openCart() {
    document.getElementById("cartDrawer").classList.add("open");

    loadCart();
    loadAddresses();
}

// 🔥 CLOSE CART
function closeCart() {
    document.getElementById("cartDrawer").classList.remove("open");
}

// 🔥 LOAD CART
function loadCart() {
    fetch("/get-cart/")
    .then(res => res.json())
    .then(data => {

        let html = "";
        let discount = 0;

        data.items.forEach(i => {

            let price = i.price || (i.subtotal / i.qty);

            html += `
            <div class="cart-item">
                <div style="display:flex; justify-content:space-between; margin-bottom:12px;">
                    <b style="font-size:1.1rem;">${i.name}</b>
                    <b style="color:var(--teal-glow);">₹${i.subtotal}</b>
                </div>
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span style="color:var(--text-muted); font-size:0.85rem;">₹${price} / each</span>
                    <div class="qty-controls" style="margin:0; background:rgba(0,0,0,0.5); padding:4px 8px; width:120px;">
                        <button style="width:24px; height:24px; font-size:1rem;" onclick="updateCart(${i.id}, ${i.qty-1})"><ion-icon name="remove-outline"></ion-icon></button>
                        <span style="font-weight:700;">${i.qty}</span>
                        <button style="width:24px; height:24px; font-size:1rem;" onclick="updateCart(${i.id}, ${i.qty+1})"><ion-icon name="add-outline"></ion-icon></button>
                    </div>
                </div>
            </div>
            `;
        });

        if (data.total > 300) { discount = 50; }
        let finalTotal = data.total - discount;

        html += `
            <div style="background:rgba(255,255,255,0.03); padding:16px; border-radius:16px; margin-top:20px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; color:var(--text-muted);"><span>Subtotal</span><span>₹${data.total}</span></div>
                <div style="display:flex; justify-content:space-between; color:var(--success); margin-bottom:16px; border-bottom:1px solid var(--border-subtle); padding-bottom:16px;"><span>Discount</span><span>-₹${discount}</span></div>
                <div class="total-row" style="margin-bottom:0;"><span>Total</span><span style="color:var(--teal-glow);">₹${Math.round(finalTotal)}</span></div>
            </div>
        `;

        document.getElementById("cartItems").innerHTML = html;
        document.getElementById("cartTotal") && (document.getElementById("cartTotal").innerText = Math.round(finalTotal));
    });
}
function updateCart(id, qty) {

    fetch("/update-cart/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({ id, qty })
    })
    .then(() => loadCart());
}
function filterStore() {

    let val = document.getElementById("searchBox").value.toLowerCase();

    document.querySelectorAll(".store-card").forEach(card => {

        let name = card.dataset.name;
        let cat = card.dataset.cat;

        if (name.includes(val) || cat.includes(val)) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }

    });
}
// 🔥 LOAD ADDRESS
function loadAddresses() {
    fetch("/get-address/")
    .then(res => res.json())
    .then(data => {

        let html = "";

        data.addresses.forEach(a => {
            html += `
                <div onclick="selectAddress(${a.id}, '${a.full_address}')"
                     style="background:rgba(255,255,255,0.05); border:1px solid var(--border-subtle); padding:12px; margin-bottom:8px; border-radius:12px; cursor:pointer; transition:0.3s;"
                     onmouseover="this.style.borderColor='var(--teal-primary)'" onmouseout="this.style.borderColor='var(--border-subtle)'">
                    <b style="color:white; display:block; margin-bottom:4px;">${a.name}</b>
                    <span style="color:var(--text-muted); font-size:0.85rem;">${a.full_address}</span>
                </div>
            `;
        });

        document.getElementById("addressList").innerHTML = html;
    });
}




function addAddress(){
    alert("Redirecting to profile to add address");
    window.location.href = "/client-dashboard/";
}
// 🔥 SELECT ADDRESS
let selectedAddressId = null;

function selectAddress(id, text) {
    selectedAddressId = id;

    document.getElementById("selectedAddress").innerHTML = `
        <b>Selected:</b><br>${text}
    `;
}
function toggleAddressList() {
    let el = document.getElementById("addressList");
    el.style.display = (el.style.display === "none") ? "block" : "none";
}
function loadOrderStatus() {

    fetch("/get-orders/")
    .then(res => res.json())
    .then(data => {

        let status = data.status; // pending / ongoing / delivered

        let steps = ["pending", "ongoing", "delivered"];

        let html = "<h4>Order Status</h4>";

        steps.forEach(s => {

            let active = (steps.indexOf(s) <= steps.indexOf(status));

            html += `
                <div style="
                    padding:16px 24px;
                    margin:8px 0;
                    border-radius:16px;
                    background:${active ? 'rgba(0,194,179,0.15)' : 'rgba(255,255,255,0.05)'};
                    border: 1px solid ${active ? 'var(--teal-primary)' : 'var(--border-subtle)'};
                    color:${active ? 'var(--teal-glow)' : 'var(--text-muted)'};
                    font-weight:600;
                    display:flex; align-items:center; gap:12px;
                ">
                    <ion-icon name="${active ? 'checkmark-circle' : 'ellipse-outline'}"></ion-icon> ${s.toUpperCase()}
                </div>
            `;
        });

        document.getElementById("orderTracking").innerHTML = html;
    });
}
// 🔥 CONFIRM ORDER
function confirmOrder() {

    if (!selectedAddressId) {
        alert("Select address first ❌");
        return;
    }

    fetch("/place-order/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({
            address_id: selectedAddressId
        })
    })
    .then(() => {
        alert("Order placed ✅");
        closeCart();

        loadOrderStatus();   // 🔥 EXACT PLACE HERE
    });
}
loadStore();

</script>

</body>
</html>
