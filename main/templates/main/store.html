<!DOCTYPE html>
<html>
<head>
    <title>Store</title>

    <style>
        body {
            background: #0A0F1C;
            color: white;
            font-family: sans-serif;
            padding: 20px;
        }

        /* HEADER */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .coin-box {
            background: gold;
            color: black;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px,1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #111;
            padding: 15px;
            border-radius: 15px;
            min-width: 200px;  
        }

        .card img {
            width: 100%;
            height: 120px;
            object-fit: cover;
        }

        button {
            padding: 8px 12px;
            border: none;
            background: teal;
            color: black;
            cursor: pointer;
            margin-top: 10px;
        }

        /* CART */
        #cartDrawer {
            position: fixed;
            right: -350px;
            top: 0;
            width: 300px;
            height: 100%;
            background: #111;
            transition: 0.3s;
            padding: 20px;
        }

        #cartDrawer.open {
            right: 0;
        }

        .close-btn {
            float: right;
            cursor: pointer;
            color: red;
            font-size: 20px;
        }

        .address-item {
            background: #222;
            padding: 8px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 10px;
        }

        .address-item:hover {
            background: teal;
            color: black;
        }

    </style>
</head>
<body>
<button onclick="goBack()" style="margin-bottom:10px;">⬅ Back</button>
<!-- HEADER -->
<div class="top-bar">
    <h2>🛒 Medicine Store</h2>

    <!-- COIN SECTION -->
    <div class="coin-box">
        🪙 120 Coins
    </div>
</div>
<input 
    id="searchBox" 
    placeholder="Search medicine..." 
    onkeyup="filterStore()" 
    style="padding:10px; margin-top:10px; width:100%; border-radius:10px;">
<button onclick="openCart()">🛒 Open Cart</button>

<div class="grid" id="storeContainer"></div>

<!-- CART -->
<div id="cartDrawer">

    <span class="close-btn" onclick="closeCart()">✖</span>

    <h3>Cart</h3>

    <!-- ADDRESS -->
    <!-- ADDRESS -->
<div>
    <h4>📍 Address</h4>

    <p id="selectedAddress" onclick="toggleAddressList()" style="cursor:pointer;">
        Select Address ▼
    </p>

    <div id="addressList" style="display:none;"></div>

    <div style="margin-top:10px;">
        <button onclick="showAddressForm()">➕ Add Address</button>
    </div>

    <div id="addressForm" style="display:none; margin-top:10px;">
        <input id="addrName" placeholder="Name"><br>
        <input id="addrPhone" placeholder="Phone"><br>
        <input id="addrCity" placeholder="City"><br>
        <input id="addrPin" placeholder="Pincode"><br>
        <textarea id="addrFull" placeholder="Full Address"></textarea><br>

        <button onclick="saveAddress()">Save Address</button>
    </div>
</div>
    <!-- ITEMS -->
    <div id="cartItems"></div>

    <h3>Total ₹ <span id="cartTotal">0</span></h3>

    <button onclick="confirmOrder()">Confirm Order</button>
</div>
<div id="orderTracking" style="margin-top:20px;"></div>
<script>

let selectedAddress = null;

// CSRF
function getCSRFToken(){
    return document.cookie.split('; ')
        .find(row => row.startsWith('csrftoken='))
        ?.split('=')[1];
}
function showAddressForm() {
    document.getElementById("addressForm").style.display = "block";
}

function saveAddress() {
    fetch("/save-address/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({
            name: document.getElementById("addrName").value,
            phone: document.getElementById("addrPhone").value,
            city: document.getElementById("addrCity").value,
            pincode: document.getElementById("addrPin").value,
            address: document.getElementById("addrFull").value
        })
    })
    .then(() => {
        alert("Address Saved ✅");
        loadAddresses();   // reload
    });
}
// 🔥 LOAD STORE
function loadStore() {
    fetch("/get-medicines/")
    .then(res => res.json())
    .then(data => {

        let grouped = {};

        // GROUP BY CATEGORY
        data.medicines.forEach(m => {
            if (!grouped[m.category]) grouped[m.category] = [];
            grouped[m.category].push(m);
        });

        let html = "";

        for (let cat in grouped) {

            html += `<h3 style="margin-top:20px;">${cat}</h3>`;

            html += `<div style="
    display:flex;
    gap:20px;
    overflow-x:auto;
    padding-bottom:10px;
">`;
html += `
<div style="display:flex; justify-content:space-between; align-items:center;">
    <h3>${cat}</h3>
    <button onclick="viewAll('${cat}')">View All</button>
</div>
`;

            grouped[cat].slice(0, 4).forEach(m => {

                html += `
                <div class="card store-card"
                     data-name="${m.name.toLowerCase()}"
                     data-cat="${m.category.toLowerCase()}">

                    <img src="${m.image}">
                    <h4>${m.name}</h4>
                    <p>₹${m.mrp}</p>

                    <!-- STOCK -->
                    <p style="font-size:12px;">
                        Available: ${m.quantity} ${m.unit}
                    </p>

                    <!-- QTY -->
                    <div style="display:flex; gap:10px; align-items:center;">
                        <button onclick="decQty(${m.id})">-</button>
                        <span id="qty-${m.id}">1</span>
                        <button onclick="incQty(${m.id})">+</button>
                    </div>

                    <button onclick="addToCart(${m.id})">Add</button>
                </div>
                `;
            });

            html += `</div>`;
        }

        document.getElementById("storeContainer").innerHTML = html;
    });
}
function goBack(){
    window.location.href = "/client-dashboard/";
}
function incQty(id) {
    let el = document.getElementById("qty-" + id);
    el.innerText = parseInt(el.innerText) + 1;
}
function viewAll(category) {
    alert("Show all medicines of " + category);
}
function decQty(id) {
    let el = document.getElementById("qty-" + id);
    let val = parseInt(el.innerText);
    if (val > 1) el.innerText = val - 1;
}
// 🔥 ADD CART
function addToCart(id) {

    let qty = parseInt(document.getElementById("qty-" + id).innerText);

    fetch("/add-to-cart/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({ id, qty })
    })
    .then(() => alert("Added ✅"));
}

// 🔥 OPEN CART
function openCart() {
    document.getElementById("cartDrawer").classList.add("open");

    loadCart();
    loadAddresses();
}

// 🔥 CLOSE CART
function closeCart() {
    document.getElementById("cartDrawer").classList.remove("open");
}

// 🔥 LOAD CART
function loadCart() {
    fetch("/get-cart/")
    .then(res => res.json())
    .then(data => {

        let html = "";
        let discount = 0;

        data.items.forEach(i => {

            let price = i.price || (i.subtotal / i.qty);

            html += `
            <div style="margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;">
                <b>${i.name}</b><br>

                ${i.qty} × ₹${price} = <b>₹${i.subtotal}</b><br>

                <button onclick="updateCart(${i.id}, ${i.qty-1})">-</button>
                ${i.qty}
                <button onclick="updateCart(${i.id}, ${i.qty+1})">+</button>
            </div>
            `;
        });

        // 🔥 SIMPLE DISCOUNT
        if (data.total > 300) {
            discount = 50;
        }

        let finalTotal = data.total - discount;

        html += `
            <hr>
            <p>Subtotal: ₹${data.total}</p>
            <p>Discount: ₹${discount}</p>
            <h3>Total: ₹${Math.round(finalTotal)}</h3>
        `;

        document.getElementById("cartItems").innerHTML = html;
        document.getElementById("cartTotal").innerText = Math.round(finalTotal);
    });
}
function updateCart(id, qty) {

    fetch("/update-cart/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({ id, qty })
    })
    .then(() => loadCart());
}
function filterStore() {

    let val = document.getElementById("searchBox").value.toLowerCase();

    document.querySelectorAll(".store-card").forEach(card => {

        let name = card.dataset.name;
        let cat = card.dataset.cat;

        if (name.includes(val) || cat.includes(val)) {
            card.style.display = "block";
        } else {
            card.style.display = "none";
        }

    });
}
// 🔥 LOAD ADDRESS
function loadAddresses() {
    fetch("/get-address/")
    .then(res => res.json())
    .then(data => {

        let html = "";

        data.addresses.forEach(a => {
            html += `
                <div onclick="selectAddress(${a.id}, '${a.full_address}')"
                     style="border:1px solid gray; padding:5px; margin:5px; cursor:pointer;">
                    ${a.name} - ${a.full_address}
                </div>
            `;
        });

        document.getElementById("addressList").innerHTML = html;
    });
}




function addAddress(){
    alert("Redirecting to profile to add address");
    window.location.href = "/client-dashboard/";
}
// 🔥 SELECT ADDRESS
let selectedAddressId = null;

function selectAddress(id, text) {
    selectedAddressId = id;

    document.getElementById("selectedAddress").innerHTML = `
        <b>Selected:</b><br>${text}
    `;
}
function toggleAddressList() {
    let el = document.getElementById("addressList");
    el.style.display = (el.style.display === "none") ? "block" : "none";
}
function loadOrderStatus() {

    fetch("/get-orders/")
    .then(res => res.json())
    .then(data => {

        let status = data.status; // pending / ongoing / delivered

        let steps = ["pending", "ongoing", "delivered"];

        let html = "<h4>Order Status</h4>";

        steps.forEach(s => {

            let active = (steps.indexOf(s) <= steps.indexOf(status));

            html += `
                <div style="
                    padding:10px;
                    margin:5px 0;
                    border-radius:10px;
                    background:${active ? "teal" : "#222"};
                    opacity:${active ? "1" : "0.5"};
                ">
                    ${s.toUpperCase()}
                </div>
            `;
        });

        document.getElementById("orderTracking").innerHTML = html;
    });
}
// 🔥 CONFIRM ORDER
function confirmOrder() {

    if (!selectedAddressId) {
        alert("Select address first ❌");
        return;
    }

    fetch("/place-order/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCSRFToken()
        },
        body: JSON.stringify({
            address_id: selectedAddressId
        })
    })
    .then(() => {
        alert("Order placed ✅");
        closeCart();

        loadOrderStatus();   // 🔥 EXACT PLACE HERE
    });
}
loadStore();

</script>

</body>
</html>
